name: nomina_control
description: Control de nómina con soporte para ControlID Flex y futuras integraciones.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Estado ───────────────────────────────────────────────────────────────
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # ── Red ──────────────────────────────────────────────────────────────────
  dio: ^5.4.3+1

  # ── Base de datos local ───────────────────────────────────────────────────
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Inyección de dependencias ─────────────────────────────────────────────
  get_it: ^7.7.0
  fpdart: ^1.2.0
  shared_preferences: ^2.3.1
  intl: ^0.20.2
  # ── Manejo de errores funcional ───────────────────────────────────────────


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
